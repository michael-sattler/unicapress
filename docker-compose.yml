
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: unicapress-web
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/apache/apache.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - APP_ENV=development
    depends_on:
      - db
    networks:
      - unicapress-network
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: unicapress-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: unicapress
      MYSQL_USER: unicapress_user
      MYSQL_PASSWORD: unicapress_password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - unicapress-network
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: unicapress-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
    networks:
      - unicapress-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  unicapress-network:
    driver: bridge
